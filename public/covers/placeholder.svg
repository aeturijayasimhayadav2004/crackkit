<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d14"/>
      <stop offset="100%" stop-color="#1a1927"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#6C5CE7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6C5CE7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="800" fill="url(#bg)"/>
  <rect width="800" height="800" fill="url(#glow)"/>
  <rect x="1" y="1" width="798" height="798" fill="none" stroke="#6C5CE7" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Document icon centered -->
  <rect x="300" y="260" width="200" height="250" rx="12" fill="#13131A" stroke="#6C5CE7" stroke-opacity="0.4" stroke-width="2"/>
  <!-- Folded corner -->
  <polygon points="460,260 500,300 460,300" fill="#1a1927" stroke="#6C5CE7" stroke-opacity="0.4" stroke-width="2" stroke-linejoin="round"/>

  <!-- Text lines -->
  <rect x="328" y="328" width="144" height="7" rx="3.5" fill="#6C5CE7" fill-opacity="0.22"/>
  <rect x="328" y="350" width="112" height="7" rx="3.5" fill="#6C5CE7" fill-opacity="0.16"/>
  <rect x="328" y="372" width="128" height="7" rx="3.5" fill="#6C5CE7" fill-opacity="0.16"/>
  <rect x="328" y="394" width="88" height="7" rx="3.5" fill="#6C5CE7" fill-opacity="0.12"/>

  <!-- PDF badge -->
  <rect x="324" y="424" width="60" height="28" rx="6" fill="#6C5CE7" fill-opacity="0.18"/>
  <text x="354" y="443" font-family="sans-serif" font-weight="700" font-size="14" fill="#6C5CE7" text-anchor="middle">PDF</text>

  <!-- Branding -->
  <text x="400" y="560" font-family="sans-serif" font-weight="600" font-size="22" fill="#6C5CE7" fill-opacity="0.45" text-anchor="middle">CrackKit</text>
  <text x="400" y="584" font-family="sans-serif" font-size="13" fill="#6C5CE7" fill-opacity="0.25" text-anchor="middle">Premium Study Material</text>
</svg>
